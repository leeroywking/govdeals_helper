name: Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Add Android platform if needed
        working-directory: mobile
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync web assets into Android
        working-directory: mobile
        run: npm run sync:android

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: govdeals-helper-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish preview release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          body: Latest Android preview build for GovDeals Helper.
          prerelease: true
          tag: android-preview
          name: Android Preview
