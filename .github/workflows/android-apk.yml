name: Android Refresh APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-python:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: pytest

      - name: Upload coverage xml
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-xml
          path: coverage.xml

  build-android:
    runs-on: ubuntu-latest
    needs: test-python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Add Android platform if needed
        working-directory: mobile
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync web assets into Android
        working-directory: mobile
        run: npm run sync:android

      - name: Write Android SDK local.properties
        working-directory: mobile/android
        shell: bash
        run: |
          SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_PATH" ]; then
            echo "ANDROID_SDK_ROOT and ANDROID_HOME are both unset" >&2
            exit 1
          fi
          printf 'sdk.dir=%s\n' "$SDK_PATH" > local.properties

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: govdeals-helper-refresh-preview-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish preview release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          body: Latest Android refresh-preview build for GovDeals Helper with on-device dataset refresh.
          prerelease: true
          tag: android-refresh-preview
          name: Android Refresh Preview
